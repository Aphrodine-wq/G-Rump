name: Feature request
description: Suggest a capability or improvement for G-Rump
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Describe the problem first — it's easier to find the right
        solution when the underlying need is clear.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that G-Rump makes hard or impossible today?
      placeholder: When I'm working across multiple repos, I can't...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like G-Rump to do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've tried or thought about.
    validations:
      required: false

  - type: dropdown
    id: willing-to-pr
    attributes:
      label: Would you be willing to contribute this?
      description: No pressure — just helps with planning.
      options:
        - "Yes, I'd like to open a PR"
        - "Maybe, with some guidance"
        - "No, just suggesting"
    validations:
      required: false
