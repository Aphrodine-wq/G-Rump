name: G-Rump CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer

jobs:
  critical-tests:
    name: Critical Tool Tests
    runs-on: macos-14
    # Cold build of the full app (~54K LOC, StrictConcurrency=complete) + ~700 tests
    # can exceed 15m on a fresh runner; the SPM cache warms subsequent runs.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-v2-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-v2-

      - name: Resolve packages
        run: swift package resolve

      - name: Build & run tests
        run: swift test --parallel -j $(sysctl -n hw.ncpu)

  lint:
    name: Code Quality
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint || true

      - name: Run SwiftLint
        run: |
          if command -v swiftlint &>/dev/null; then
            swiftlint lint --strict --reporter github-actions-logging Sources/GRump/ || exit 1
          else
            echo "::warning::SwiftLint not installed, skipping lint checks"
          fi

      - name: Check for force unwraps (non-constant)
        run: |
          # Allow documented constant force unwraps (swiftlint:disable comments)
          VIOLATIONS=$(grep -rn ')!' Sources/GRump/*.swift Sources/GRump/**/*.swift 2>/dev/null \
            | grep -v 'swiftlint:disable' \
            | grep -v 'isEmpty' \
            | grep -v '.filter' \
            | grep -v '.contains' \
            | grep -v '// ' \
            || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "⚠️  Potential force unwraps found (review needed):"
            echo "$VIOLATIONS"
          fi

      - name: Check for print() statements
        run: |
          PRINTS=$(grep -rn --include='*.swift' 'print(' Sources/GRump/ 2>/dev/null \
            | grep -v 'Text("print' \
            | grep -v "python3.*print" \
            | grep -v "bc.*print" \
            | grep -v 'fingerprint' \
            | grep -v 'blueprint' \
            | grep -v 'footprint' \
            | grep -v 'sprint(' \
            | grep -v 'prettyPrint' \
            | grep -v 'debugPrint' \
            || true)
          if [ -n "$PRINTS" ]; then
            echo "❌ Found print() — use GRumpLogger instead:"
            echo "$PRINTS"
            exit 1
          fi

      - name: Verify PrivacyInfo.xcprivacy exists
        run: test -f Sources/GRump/Resources/PrivacyInfo.xcprivacy

      - name: Verify LICENSE exists
        run: test -f LICENSE

  release:
    name: Release Build
    runs-on: macos-14
    timeout-minutes: 30
    needs: [critical-tests, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-v2-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-v2-

      - name: Install create-dmg
        run: brew install create-dmg || true

      - name: Import Developer ID certificate
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "${CERTIFICATE_P12:-}" ]; then
            echo "::warning::No signing certificate configured. Building unsigned."
            echo "SIGNING_AVAILABLE=false" >> "$GITHUB_ENV"
          else
            # Create a temporary keychain for CI
            KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
            KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

            security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

            # Import the certificate
            CERT_PATH="$RUNNER_TEMP/certificate.p12"
            echo "$CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
            security import "$CERT_PATH" \
              -P "$CERTIFICATE_PASSWORD" \
              -A \
              -t cert \
              -f pkcs12 \
              -k "$KEYCHAIN_PATH"
            rm -f "$CERT_PATH"

            # Add keychain to search list
            security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

            # Allow codesign to access the key without UI prompt
            security set-key-partition-list -S apple-tool:,apple:,codesign: \
              -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

            echo "SIGNING_AVAILABLE=true" >> "$GITHUB_ENV"
            echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

            # Extract the Developer ID identity name
            IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
              | grep "Developer ID Application" \
              | head -1 \
              | sed 's/.*"\(.*\)".*/\1/')
            echo "DEVELOPER_ID=$IDENTITY" >> "$GITHUB_ENV"
            echo "Imported signing identity: $IDENTITY"
          fi

      - name: Build and package
        run: |
          if [ "${SIGNING_AVAILABLE:-false}" = "true" ]; then
            echo "Building signed release with DMG..."
            make package
          else
            echo "Building unsigned release..."
            make app
          fi

      - name: Verify code signature
        if: env.SIGNING_AVAILABLE == 'true'
        run: |
          echo "=== Signature Info ==="
          codesign -dvv dist/G-Rump.app 2>&1
          echo ""
          echo "=== Deep Verification ==="
          codesign --verify --deep --strict --verbose=2 dist/G-Rump.app 2>&1

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: G-Rump-${{ github.sha }}
          path: dist/G-Rump.app
          retention-days: 30

      - name: Upload .dmg artifact
        if: env.SIGNING_AVAILABLE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: G-Rump-${{ github.sha }}.dmg
          path: dist/G-Rump.dmg
          retention-days: 30

      - name: Cleanup keychain
        if: always() && env.KEYCHAIN_PATH != ''
        run: security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

  # ── Signed + Notarized Release (on tags) ────────────────
  distribute:
    name: Notarize & Release
    runs-on: macos-14
    timeout-minutes: 45
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [critical-tests, lint]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Building release version: $VERSION"

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-v2-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-v2-

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "${CERTIFICATE_P12:-}" ]; then
            echo "::warning::No signing certificate configured — releasing an unsigned (ad-hoc) build."
            echo "SIGNING_AVAILABLE=false" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "SIGNING_AVAILABLE=true" >> "$GITHUB_ENV"

          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" \
            | head -1 \
            | sed 's/.*"\(.*\)".*/\1/')
          echo "DEVELOPER_ID=$IDENTITY" >> "$GITHUB_ENV"
          echo "Imported signing identity: $IDENTITY"

      - name: Build and package zip
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          if [ "${SIGNING_AVAILABLE:-false}" = "true" ]; then
            echo "Building signed + notarized release zip..."
            make release-zip
          else
            echo "Building unsigned (ad-hoc) release zip..."
            make zip
          fi

      - name: Verify notarization
        if: env.SIGNING_AVAILABLE == 'true'
        run: |
          echo "=== Gatekeeper Assessment ==="
          spctl --assess --type execute --verbose=2 dist/G-Rump.app 2>&1 || true
          echo ""
          echo "=== Staple Validation ==="
          xcrun stapler validate dist/G-Rump.app 2>&1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          mv dist/G-Rump.zip "dist/G-Rump-$VERSION.zip"

          if [ "${SIGNING_AVAILABLE:-false}" = "true" ]; then
            RELEASE_NOTES="## G-Rump $TAG

          ### Install
          1. Download **G-Rump-$VERSION.zip** below
          2. Unzip and drag **G-Rump.app** to Applications
          3. Launch — no Gatekeeper warning; the app is signed and notarized

          ### Requirements
          - macOS 14.0 (Sonoma) or later
          - Apple Silicon or Intel Mac (universal binary)

          ---
          *Signed with Developer ID and notarized by Apple. Full changes in [CHANGELOG.md](https://github.com/Aphrodine-wq/G-Rump/blob/main/CHANGELOG.md).*"
          else
            RELEASE_NOTES="## G-Rump $TAG

          ### Install
          1. Download **G-Rump-$VERSION.zip** below
          2. Unzip and drag **G-Rump.app** to Applications
          3. First launch: this build is not yet notarized, so macOS will warn.
             Either open **System Settings → Privacy & Security → Open Anyway**
             after the first attempt, or clear the quarantine flag:
             \`xattr -dr com.apple.quarantine /Applications/G-Rump.app\`

          Prefer not to trust a downloaded binary? Build from source: \`git clone\` + \`make run\` (see the README).

          ### Requirements
          - macOS 14.0 (Sonoma) or later
          - Apple Silicon or Intel Mac (universal binary)

          ---
          *Full changes in [CHANGELOG.md](https://github.com/Aphrodine-wq/G-Rump/blob/main/CHANGELOG.md).*"
          fi

          # Idempotent: a release may already exist (created via
          # scripts/create-release.sh) — attach the artifact instead of failing.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — uploading artifact only."
            gh release upload "$TAG" "dist/G-Rump-$VERSION.zip" --clobber
          else
            gh release create "$TAG" \
              --title "G-Rump $TAG" \
              --notes "$RELEASE_NOTES" \
              "dist/G-Rump-$VERSION.zip"
          fi

      - name: Cleanup keychain
        if: always() && env.KEYCHAIN_PATH != ''
        run: security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
